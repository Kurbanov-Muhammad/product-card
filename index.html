<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css"> 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

  <main class="catalog">
    <div class="container catalog__container">
      <h1 class="catalog__title">Выбери свой продукт</h1>
      <button class="change-card-color-btn">Изменить цвет карточки</button>
      <button class="change-cards-color-btn">Изменить цвет всех карточек</button>
      <button class="open-google">Открыть страницу Google.com</button>
      <button class="output-console-log">Вывести значение в консоль лог</button>
      <button class="toggle-color-button">Переключатель цвета кнопки</button>
      <ul class="products">
      <template id="product-template">
        <li class="products__item card">
          <img src="" alt="" class="card__image">
          <span class="card__category"></span>
          <h2 class="card__name"></h2>
          <p class="card__description"></p>
          <div class="card__compound compound">
            <span class="compound__name">Состав: </span>
            <ul class="compound__list">

            </ul>
          </div>
          <div class="card__price">
            <b class="card__price-label">Цена:</b>
            <span class="card__price-value"></span>
          </div>
        </li>
      </template>
      </ul>
    </div>
  </main>
  <script src="main.js"></script>
  <script src="homework-7.js"></script>
  <script src="homework-8.js"></script>
  <script type="module" src="homework-9.js"></script>
  <script type="module" src="homework-10.js"></script>
</body>
</html>
